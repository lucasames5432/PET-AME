<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena 24 Automática | PET-AME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f1f8e9; --card: #ffffff; --green: #388e3c; --accent: #009688; --dark: #263238; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Ranking */
        .sidebar { width: 280px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        .jogador-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #37474f; align-items: center; }
        .status-badge { font-size: 0.65rem; padding: 3px 8px; border-radius: 10px; background: #546e7a; text-transform: uppercase; }
        .status-pronto { background: var(--green); color: white; }

        /* Área Principal */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 750px; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        .mesa { display: flex; justify-content: center; gap: 15px; margin: 25px 0; min-height: 170px; }
        .card-img { width: 115px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 15px 35px; border-radius: 30px; cursor: pointer; font-weight: 600; margin: 10px; transition: 0.3s; font-size: 1.1rem; }
        .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,150,136,0.4); }
        .btn-red { background: #d32f2f; }
        .btn-gray { background: #90a4ae; }
        .btn:disabled { background: #eee; color: #bbb; cursor: not-allowed; }

        /* Alertas e Soluções */
        #status-info { background: #fff3e0; padding: 15px; border-radius: 10px; margin-bottom: 25px; font-weight: 600; color: #e65100; width: 100%; box-sizing: border-box; font-size: 1.2rem; }
        #revelacao-solucoes { background: #e3f2fd; padding: 20px; border-radius: 15px; margin-top: 25px; display: none; text-align: left; border-left: 6px solid #1e88e5; }
        #timer-proxima { color: #d32f2f; font-weight: bold; font-size: 1.1rem; margin-top: 10px; }
        
        input { padding: 15px; border-radius: 10px; border: 2px solid #ddd; width: 85%; margin-bottom: 15px; font-size: 1.3rem; text-align: center; font-family: monospace; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3><i class="fas fa-medal"></i> Ranking Sala</h3>
        <ul id="placar-lista" style="list-style:none; padding:0;"></ul>
        <div style="margin-top: auto; font-size: 0.7rem; opacity: 0.4;">Sincronização via Firebase RTDB</div>
    </div>

    <div class="main-content">
        <div class="container" id="tela-login">
            <h2 style="color: var(--green);">Arena PET-AME 24</h2>
            <p>Entre com seu nome e o código da sala do laboratório.</p>
            <input type="text" id="nome-usuario" placeholder="Seu Nome">
            <input type="text" id="codigo-sala" placeholder="Ex: SALA01">
            <br>
            <button class="btn" onclick="entrarNaSala()">Entrar na Partida</button>
        </div>

        <div class="container" id="tela-jogo" style="display:none;">
            <div id="status-info">Aguardando o mestre da sala...</div>
            
            <div class="mesa" id="mesa-cartas"></div>

            <div id="controles">
                <button class="btn btn-red" id="btn-bati" onclick="bater()">BATI!</button>
                <button class="btn btn-gray" id="btn-desisto" onclick="desistir()">DESISTO</button>
            </div>

            <div id="area-solucao" style="display:none; margin-top:20px; padding: 20px; border: 2px solid var(--accent); border-radius: 15px;">
                <p><strong>Prove sua solução!</strong></p>
                <input type="text" id="input-conta" placeholder="Digite a expressão">
                <br>
                <button class="btn" onclick="verificarConta()">Validar Agora</button>
            </div>

            <div id="revelacao-solucoes">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong style="color:#1565c0; font-size: 1.1rem;">💡 Como resolver essa mão:</strong>
                    <span id="timer-proxima"></span>
                </div>
                <ul id="lista-possibilidades" style="font-family: monospace; font-size: 1rem; margin-top: 10px; line-height: 1.6; color: #0d47a1;"></ul>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="banco_solucoes.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0dK-OFYJEY55n4lksVBOytaoHAnlbq7Q",
            authDomain: "pet-ame-24.firebaseapp.com",
            projectId: "pet-ame-24",
            databaseURL: "https://pet-ame-24-default-rtdb.firebaseio.com",
            storageBucket: "pet-ame-24.firebasestorage.app",
            messagingSenderId: "969986270740",
            appId: "1:969986270740:web:8418e725243cd804f7a901"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome = "", salaID = "", cartasAtuais = [], minhaVez = true, rodadaFinalizada = false;

        function entrarNaSala() {
            meuNome = document.getElementById('nome-usuario').value.trim();
            salaID = document.getElementById('codigo-sala').value.trim().toUpperCase();
            if(!meuNome || !salaID) return alert("Preencha os campos!");

            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-jogo').style.display = 'block';

            db.ref(`salas/${salaID}/jogadores/${meuNome}`).update({ pontos: 0, pronto: false });

            // Listener Global da Sala
            db.ref('salas/' + salaID).on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                gerenciarFluxoJogo(data);
            });
        }

        function gerenciarFluxoJogo(data) {
            // 1. Atualizar Placar
            const lista = document.getElementById('placar-lista');
            lista.innerHTML = "";
            const jogadoresEntries = Object.entries(data.jogadores || {});
            const jogadoresOrdenados = jogadoresEntries.sort((a,b) => b[1].pontos - a[1].pontos);
            
            let totalJogadores = jogadoresEntries.length;
            let prontos = 0;

            jogadoresOrdenados.forEach(([nome, info]) => {
                if(info.pronto) prontos++;
                lista.innerHTML += `
                    <li class="jogador-item">
                        <span>${nome} <span class="status-badge ${info.pronto ? 'status-pronto' : ''}">${info.pronto ? 'PRONTO' : '...'}</span></span>
                        <span class="pontos">${info.pontos} pts</span>
                    </li>`;
            });

            // 2. Sorteio Automático se a mesa estiver vazia (Primeiro jogador a entrar faz isso)
            if(!data.cartas && meuNome === jogadoresOrdenados[0][0]) {
                setTimeout(proximaRodada, 1000);
            }

            // 3. Detecção de Nova Rodada
            if(data.cartas && JSON.stringify(cartasAtuais) !== JSON.stringify(data.cartas)) {
                cartasAtuais = data.cartas;
                rodadaFinalizada = false;
                minhaVez = true;
                renderizarCartas(data.cartas);
                document.getElementById('revelacao-solucoes').style.display = 'none';
                document.getElementById('area-solucao').style.display = 'none';
                document.getElementById('btn-bati').disabled = false;
                document.getElementById('btn-desisto').disabled = false;
            }

            // 4. Bloqueio por "BATI"
            if(data.status === "bloqueado") {
                document.getElementById('status-info').innerText = `🧐 ${data.quemBateu} analisando...`;
                document.getElementById('btn-bati').disabled = true;
                document.getElementById('btn-desisto').disabled = true;
                if(data.quemBateu === meuNome) document.getElementById('area-solucao').style.display = 'block';
            } else if (!rodadaFinalizada) {
                document.getElementById('status-info').innerText = "⚡ Resolva agora!";
            }

            // 5. GATILHO AUTOMÁTICO: Todos responderam?
            if(prontos >= totalJogadores && totalJogadores > 0 && !rodadaFinalizada) {
                finalizarRodadaAutomatico(data.cartas, jogadoresOrdenados[0][0]);
            }
        }

        function finalizarRodadaAutomatico(cartas, lider) {
            rodadaFinalizada = true;
            document.getElementById('status-info').innerText = "🏁 Rodada Encerrada!";
            document.getElementById('btn-bati').disabled = true;
            document.getElementById('btn-desisto').disabled = true;
            mostrarPossibilidades(cartas);

            // Contagem regressiva visual
            let segundos = 8;
            const timerEl = document.getElementById('timer-proxima');
            const intervalo = setInterval(() => {
                timerEl.innerText = `Próxima em ${segundos}s`;
                segundos--;
                if(segundos < 0) {
                    clearInterval(intervalo);
                    // Apenas o primeiro da lista (Líder) dispara o sorteio para evitar conflito
                    if(meuNome === lider) proximaRodada();
                }
            }, 1000);
        }

        function proximaRodada() {
            const mao = maosValidas[Math.floor(Math.random() * maosValidas.length)];
            db.ref(`salas/${salaID}/jogadores`).once('value', snap => {
                const j = snap.val();
                const updates = {};
                for(let n in j) updates[`jogadores/${n}/pronto`] = false;
                updates['cartas'] = mao;
                updates['status'] = "jogando";
                updates['quemBateu'] = "";
                db.ref(`salas/${salaID}`).update(updates);
            });
        }

        function bater() {
            db.ref('salas/' + salaID).update({ status: "bloqueado", quemBateu: meuNome });
            document.getElementById('input-conta').focus();
        }

        function desistir() {
            minhaVez = false;
            document.getElementById('btn-bati').disabled = true;
            document.getElementById('btn-desisto').disabled = true;
            db.ref(`salas/${salaID}/jogadores/${meuNome}`).update({ pronto: true });
        }

        function verificarConta() {
            const conta = document.getElementById('input-conta').value;
            try {
                if (/[^0-9\+\-\*\/\(\)\. ]/.test(conta)) throw "Caracteres inválidos!";
                const numsUsados = (conta.match(/\d+/g) || []).map(Number).sort((a,b)=>a-b);
                const mesaOrdenada = [...cartasAtuais].sort((a,b)=>a-b);

                if (JSON.stringify(numsUsados) !== JSON.stringify(mesaOrdenada)) throw "Use exatamente as cartas da mesa!";

                if (Math.abs(eval(conta) - 24) < 0.1) {
                    minhaVez = false;
                    // Pontos: número de jogadores na sala
                    db.ref(`salas/${salaID}/jogadores`).once('value', snap => {
                        const total = Object.keys(snap.val()).length;
                        db.ref(`salas/${salaID}/jogadores/${meuNome}`).update({ 
                            pronto: true, 
                            pontos: firebase.database.ServerValue.increment(total) 
                        });
                        db.ref(`salas/${salaID}`).update({ status: "jogando", quemBateu: "" });
                    });
                    document.getElementById('input-conta').value = "";
                } else {
                    alert("❌ Errado! Deu " + eval(conta) + ". Tentativa perdida!");
                    db.ref(`salas/${salaID}`).update({ status: "jogando", quemBateu: "" });
                }
            } catch(e) { alert(e); }
        }

        function renderizarCartas(cartas) {
            const mesa = document.getElementById('mesa-cartas');
            mesa.innerHTML = "";
            cartas.forEach(num => {
                let v = (num === 1) ? 'A' : (num === 10) ? '0' : (num === 11) ? 'J' : (num === 12) ? 'Q' : (num === 13) ? 'K' : num;
                mesa.innerHTML += `<img src="https://deckofcardsapi.com/static/img/${v}D.png" class="card-img">`;
            });
        }

        function mostrarPossibilidades(mao) {
            const lista = document.getElementById('lista-possibilidades');
            const chave = "[" + mao.join(", ") + "]";
            const solucoes = bancoSolucoes[chave] || ["Nenhuma solução encontrada"];
            lista.innerHTML = solucoes.slice(0, 4).map(s => `<li><i class="fas fa-check"></i> ${s} = 24</li>`).join("");
            document.getElementById('revelacao-solucoes').style.display = 'block';
        }
    </script>
</body>
</html>
