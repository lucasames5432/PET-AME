<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena 24 Master | PET-AME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f1f8e9; --card: #ffffff; --green: #388e3c; --accent: #009688; --dark: #263238; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; flex-direction: row; }
        .sidebar { width: 260px; background: var(--dark); color: white; padding: 20px; display: none; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 10; }
        .jogador-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #37474f; align-items: center; font-size: 0.9rem; }
        .status-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; background: #546e7a; }
        .status-pronto { background: var(--green); }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .container { width: 95%; max-width: 700px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .mesa { display: flex; justify-content: center; gap: 10px; margin: 20px 0; min-height: 120px; flex-wrap: wrap; }
        .card-img { width: 22%; max-width: 110px; min-width: 70px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: 600; margin: 8px; transition: 0.2s; font-size: 1rem; }
        .btn-red { background: #d32f2f; }
        .btn-gray { background: #90a4ae; }
        .btn:disabled { background: #eee; color: #bbb; cursor: not-allowed; }
        #status-info { background: #fff3e0; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-weight: 600; color: #e65100; font-size: 1.1rem; }
        #revelacao-solucoes { background: #e3f2fd; padding: 15px; border-radius: 12px; margin-top: 20px; display: none; text-align: left; border-left: 5px solid #1e88e5; }
        .vencedor-box { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #90a4ae; color: #2e7d32; font-weight: bold; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #ddd; width: 90%; max-width: 400px; margin-bottom: 12px; font-size: 1.2rem; text-align: center; font-family: monospace; }
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; min-height: 100vh; }
            .sidebar { width: 100%; height: auto; box-sizing: border-box; padding: 10px 20px; }
            .main-content { padding: 15px; justify-content: flex-start; margin-top: 20px; }
            .card-img { width: 35%; }
            .btn { width: 80%; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="barra-ranking">
        <h3><i class="fas fa-medal"></i> Ranking Sala</h3>
        <ul id="placar-lista" style="list-style:none; padding:0;"></ul>
    </div>

    <div class="main-content">
        <div class="container" id="tela-login">
            <h2 style="color: var(--green); margin-top:0;">Arena PET-AME 24</h2>
            <input type="text" id="nome-usuario" placeholder="Seu Nome">
            <input type="text" id="codigo-sala" placeholder="Código da Sala">
            <br>
            <button class="btn" id="btn-entrar" onclick="entrarNaSala()">Entrar na Arena</button>
        </div>

        <div class="container" id="tela-jogo" style="display:none;">
            <div id="status-info">Aguardando jogadores...</div>
            <div class="mesa" id="mesa-cartas"></div>
            <div id="controles">
                <button class="btn btn-red" id="btn-bati" onclick="bater()">BATI!</button>
                <button class="btn btn-gray" id="btn-desisto" onclick="desistir()">DESISTO</button>
            </div>
            <div id="area-solucao" style="display:none; margin-top:15px;">
                <p><strong>Sua Expressão:</strong></p>
                <input type="text" id="input-conta" placeholder="Ex: (10+2)*(8/4)">
                <br>
                <button class="btn" id="btn-validar" onclick="verificarConta()">Validar</button>
            </div>
            <div id="revelacao-solucoes">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong style="color:#1565c0;">💡 Soluções do Banco:</strong>
                    <span id="timer-proxima" style="color:red; font-weight:bold;"></span>
                </div>
                <ul id="lista-possibilidades" style="font-family: monospace; font-size: 0.9rem; margin-top: 8px;"></ul>
                <div id="vencedor-info" class="vencedor-box"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="banco_solucoes.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0dK-OFYJEY55n4lksVBOytaoHAnlbq7Q",
            authDomain: "pet-ame-24.firebaseapp.com",
            projectId: "pet-ame-24",
            databaseURL: "https://pet-ame-24-default-rtdb.firebaseio.com",
            storageBucket: "pet-ame-24.firebasestorage.app",
            messagingSenderId: "969986270740",
            appId: "1:969986270740:web:8418e725243cd804f7a901"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome = "", salaID = "", cartasAtuais = [], rodadaFinalizada = false, jaRespondeu = false;

        async function entrarNaSala() {
            meuNome = document.getElementById('nome-usuario').value.trim();
            salaID = document.getElementById('codigo-sala').value.trim().toUpperCase();
            if(!meuNome || !salaID) return alert("Preencha tudo!");

            const snapshot = await db.ref(`salas/${salaID}/jogadores/${meuNome}`).get();
            if(snapshot.exists()){
                alert("Este nome já está em uso nesta sala. Escolha outro!");
                return;
            }

            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-jogo').style.display = 'block';
            document.getElementById('barra-ranking').style.display = 'flex';

            db.ref(`salas/${salaID}/jogadores/${meuNome}`).set({ pontos: 0, pronto: false });

            db.ref('salas/' + salaID).on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;
                gerenciarFluxoJogo(data);
            });
        }

        function gerenciarFluxoJogo(data) {
            const lista = document.getElementById('placar-lista');
            lista.innerHTML = "";
            const jogadoresEntries = Object.entries(data.jogadores || {});
            const jogadoresOrdenados = jogadoresEntries.sort((a,b) => b[1].pontos - a[1].pontos);
            let prontos = 0;

            jogadoresOrdenados.forEach(([nome, info]) => {
                if(info.pronto) prontos++;
                lista.innerHTML += `<li class="jogador-item"><span>${nome} <span class="status-badge ${info.pronto ? 'status-pronto' : ''}">${info.pronto ? 'OK' : '...'}</span></span><span class="pontos">${info.pontos} pts</span></li>`;
            });

            if(!data.cartas && meuNome === jogadoresOrdenados[0][0]) setTimeout(proximaRodada, 1000);

            if(data.cartas && JSON.stringify(cartasAtuais) !== JSON.stringify(data.cartas)) {
                cartasAtuais = data.cartas;
                rodadaFinalizada = false;
                jaRespondeu = false;
                renderizarCartas(data.cartas);
                document.getElementById('revelacao-solucoes').style.display = 'none';
                document.getElementById('area-solucao').style.display = 'none';
                document.getElementById('btn-bati').disabled = false;
                document.getElementById('btn-desisto').disabled = false;
                document.getElementById('btn-validar').disabled = false;
                document.getElementById('input-conta').value = "";
                document.getElementById('vencedor-info').innerHTML = "";
            }

            if(data.status === "bloqueado") {
                document.getElementById('status-info').innerText = `${data.quemBateu} resolvendo...`;
                document.getElementById('btn-bati').disabled = true;
                if(data.quemBateu === meuNome && !jaRespondeu) {
                    document.getElementById('area-solucao').style.display = 'block';
                }
            } else if (!rodadaFinalizada) {
                document.getElementById('status-info').innerText = "Valendo 24!";
            }

            if((data.status === "terminada" || (prontos >= jogadoresEntries.length && jogadoresEntries.length > 0)) && !rodadaFinalizada) {
                finalizarRodada(data);
            }
        }

        function finalizarRodada(data) {
            rodadaFinalizada = true;
            document.getElementById('status-info').innerText = "🏁 Rodada Finalizada!";
            document.getElementById('btn-bati').disabled = true;
            document.getElementById('btn-desisto').disabled = true;
            document.getElementById('area-solucao').style.display = 'none';
            
            mostrarPossibilidades(data.cartas);

            if(data.ultimaSolucao) {
                document.getElementById('vencedor-info').innerHTML = 
                    `<i class="fas fa-trophy"></i> Vencedor: ${data.quemGanhou}<br>` +
                    `<i class="fas fa-calculator"></i> Solução: ${data.ultimaSolucao} = 24`;
            } else {
                document.getElementById('vencedor-info').innerHTML = "Ninguém acertou esta rodada.";
            }

            let segundos = 10;
            const timerEl = document.getElementById('timer-proxima');
            const intervalo = setInterval(() => {
                timerEl.innerText = `Próxima em ${segundos}s`;
                segundos--;
                if(segundos < 0) {
                    clearInterval(intervalo);
                    db.ref(`salas/${salaID}/jogadores`).once('value', snap => {
                        const jogs = Object.entries(snap.val()).sort((a,b)=>b[1].pontos - a[1].pontos);
                        if(meuNome === jogs[0][0]) proximaRodada();
                    });
                }
            }, 1000);
        }

        function proximaRodada() {
            const mao = maosValidas[Math.floor(Math.random() * maosValidas.length)];
            db.ref(`salas/${salaID}`).once('value', snap => {
                const data = snap.val();
                const updates = {};
                if(data.jogadores) {
                    for(let n in data.jogadores) updates[`jogadores/${n}/pronto`] = false;
                }
                updates['cartas'] = mao;
                updates['status'] = "jogando";
                updates['quemBateu'] = "";
                updates['ultimaSolucao'] = "";
                updates['quemGanhou'] = "";
                db.ref(`salas/${salaID}`).update(updates);
            });
        }

        function bater() { 
            db.ref('salas/' + salaID).update({ status: "bloqueado", quemBateu: meuNome }); 
        }

        function desistir() {
            jaRespondeu = true;
            db.ref(`salas/${salaID}/jogadores/${meuNome}`).update({ pronto: true });
        }

       function verificarConta() {
    const btn = document.getElementById('btn-validar');
    let contaRaw = document.getElementById('input-conta').value;
    btn.disabled = true;

    // 1. LIMPEZA E TRADUÇÃO (Prevenção de erros de digitação)
    let conta = contaRaw.replace(/×/g, "*")
                        .replace(/÷/g, "/")
                        .replace(/,/g, ".")
                        .replace(/\s+/g, ""); // Remove espaços

    try {
        // 2. SEGURANÇA (Só permite números e operadores)
        if (/[^0-9\+\-\*\/\(\)\.]/.test(conta)) {
            throw "❌ Caractere inválido! Use apenas números e sinais (+ - * /)";
        }

        // 3. CONFERÊNCIA DE CARTAS (O coração do jogo)
        const numsDigitados = (conta.match(/\d+/g) || []).map(Number).sort((a,b)=>a-b);
        const mesaOrdenada = [...cartasAtuais].sort((a,b)=>a-b);

        if (numsDigitados.length !== 4) {
            throw "❌ Você precisa usar as 4 cartas da mesa!";
        }

        if (JSON.stringify(numsDigitados) !== JSON.stringify(mesaOrdenada)) {
            throw "❌ Os números digitados não batem com as cartas da mesa!";
        }

        // 4. CÁLCULO
        const resultado = eval(conta);
        
        if (Math.abs(resultado - 24) < 0.01) {
            jaRespondeu = true;
            db.ref(`salas/${salaID}/jogadores`).once('value', snap => {
                const total = Object.keys(snap.val()).length;
                
                // Grava a vitória e o histórico
                db.ref(`salas/${salaID}/jogadores/${meuNome}`).update({ 
                    pronto: true, 
                    pontos: firebase.database.ServerValue.increment(total) 
                });
                
                db.ref(`salas/${salaID}`).update({ 
                    status: "terminada", 
                    quemBateu: "", 
                    ultimaSolucao: contaRaw, 
                    quemGanhou: meuNome 
                });
            });
        } else {
            alert(`❌ Quase! Sua conta deu ${resultado.toFixed(1)}. Tente chegar em 24!`);
            btn.disabled = false;
            // Libera a sala para outros tentarem se ele errou
            db.ref(`salas/${salaID}`).update({ status: "jogando", quemBateu: "" });
        }

    } catch(e) { 
        alert(e); 
        btn.disabled = false;
        // Se deu erro de sintaxe, libera a sala também
        db.ref(`salas/${salaID}`).update({ status: "jogando", quemBateu: "" });
    }
}

        function renderizarCartas(cartas) {
            const mesa = document.getElementById('mesa-cartas');
            mesa.innerHTML = "";
            cartas.forEach(num => {
                let v = (num === 1) ? 'A' : (num === 10) ? '0' : (num === 11) ? 'J' : (num === 12) ? 'Q' : (num === 13) ? 'K' : num;
                mesa.innerHTML += `<img src="https://deckofcardsapi.com/static/img/${v}D.png" class="card-img">`;
            });
        }

        function mostrarPossibilidades(mao) {
            const lista = document.getElementById('lista-possibilidades');
            const chave = "[" + mao.join(", ") + "]";
            const solucoes = (typeof bancoSolucoes !== 'undefined') ? (bancoSolucoes[chave] || ["Nenhuma"]) : ["Erro banco"];
            lista.innerHTML = solucoes.slice(0, 3).map(s => `<li><i class="fas fa-lightbulb"></i> ${s} = 24</li>`).join("");
            document.getElementById('revelacao-solucoes').style.display = 'block';
        }
    </script>
</body>
</html>
