<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo 24 Multiplayer | PET-AME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f1f8e9; --card: #ffffff; --green: #388e3c; --accent: #009688; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout Principal */
        .sidebar { width: 250px; background: #263238; color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 700px; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Placar */
        #placar-lista { list-style: none; padding: 0; margin-top: 20px; }
        .jogador-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #37474f; font-size: 0.9rem; }
        .pontos { color: #81c784; font-weight: bold; }

        /* Jogo */
        .mesa { display: flex; justify-content: center; gap: 15px; margin: 25px 0; flex-wrap: wrap; min-height: 160px;}
        .card-img { width: 110px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: 0.3s; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: 600; margin: 10px; transition: 0.3s; font-size: 1rem; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,150,136,0.3); }
        .btn-red { background: #d32f2f; }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 80%; margin-bottom: 10px; font-size: 1.1rem; text-align: center; }
        #status-info { background: #fff3e0; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: 600; color: #e65100; width: 100%; box-sizing: border-box; }
        #ultima-vitoria { font-style: italic; color: var(--green); margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3><i class="fas fa-trophy"></i> Ranking</h3>
        <ul id="placar-lista">
            </ul>
        <div style="margin-top: auto; font-size: 0.7rem; opacity: 0.5;">PET-AME UNESPAR</div>
    </div>

    <div class="main-content">
        <div class="container" id="tela-login">
            <h2>Bem-vindo ao Jogo 24</h2>
            <input type="text" id="nome-usuario" placeholder="Seu Nome">
            <input type="text" id="codigo-sala" placeholder="Código da Sala">
            <br>
            <button class="btn" onclick="entrarNaSala()">Entrar na Arena</button>
        </div>

        <div class="container" id="tela-jogo" style="display:none;">
            <div id="status-info">Aguardando início...</div>
            
            <div class="mesa" id="mesa-cartas"></div>

            <div id="controles">
                <button class="btn" id="btn-sortear" onclick="sortearParaTodos()">Novo Sorteio</button>
                <button class="btn btn-red" id="btn-bati" onclick="bater()" style="display:none;">BATI!</button>
            </div>

            <div id="area-solucao" style="display:none;">
                <p>Resolva rápido!</p>
                <input type="text" id="input-conta" placeholder="Ex: (10+2)*(8/4)">
                <br>
                <button class="btn" onclick="verificarConta()">Validar Solução</button>
            </div>

            <div id="ultima-vitoria"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="banco_solucoes.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0dK-OFYJEY55n4lksVBOytaoHAnlbq7Q",
            authDomain: "pet-ame-24.firebaseapp.com",
            projectId: "pet-ame-24",
            databaseURL: "https://pet-ame-24-default-rtdb.firebaseio.com",
            storageBucket: "pet-ame-24.firebasestorage.app",
            messagingSenderId: "969986270740",
            appId: "1:969986270740:web:8418e725243cd804f7a901"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome = "";
        let salaID = "";
        let cartasAtuais = [];
        let listaJogadoresLocal = [];

        function entrarNaSala() {
            meuNome = document.getElementById('nome-usuario').value.trim();
            salaID = document.getElementById('codigo-sala').value.trim().toUpperCase();

            if(!meuNome || !salaID) return alert("Ei! Digite seu nome e a sala.");

            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('tela-jogo').style.display = 'block';

            // Registra presença e zera pontos se for novo
            db.ref(`salas/${salaID}/jogadores/${meuNome}`).transaction((atual) => {
                return atual === null ? { pontos: 0 } : atual;
            });

            // OUVIR TUDO DA SALA
            db.ref('salas/' + salaID).on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                // Atualizar Placar
                if(data.jogadores) {
                    atualizarPlacar(data.jogadores);
                    listaJogadoresLocal = Object.keys(data.jogadores);
                }

                // Atualizar Cartas
                if(data.cartas) {
                    cartasAtuais = data.cartas;
                    renderizarCartas(data.cartas);
                    document.getElementById('btn-bati').style.display = 'inline-block';
                }

                // Status da Rodada
                if(data.status === "bloqueado") {
                    document.getElementById('status-info').innerText = `🔒 ${data.quemBateu} está tentando resolver...`;
                    document.getElementById('btn-bati').disabled = true;
                } else {
                    document.getElementById('status-info').innerText = "🎴 Cartas na mesa! Quem faz 24 primeiro?";
                    document.getElementById('btn-bati').disabled = false;
                    document.getElementById('area-solucao').style.display = 'none';
                }

                if(data.ultimaSolucao) document.getElementById('ultima-vitoria').innerText = data.ultimaSolucao;
            });
        }

        function atualizarPlacar(jogadores) {
            const lista = document.getElementById('placar-lista');
            lista.innerHTML = "";
            // Ordenar por pontos (descendente)
            const ordenados = Object.entries(jogadores).sort((a,b) => b[1].pontos - a[1].pontos);
            
            ordenados.forEach(([nome, info]) => {
                lista.innerHTML += `
                    <li class="jogador-item">
                        <span>${nome}</span>
                        <span class="pontos">${info.pontos} pts</span>
                    </li>`;
            });
        }

        function sortearParaTodos() {
            if(typeof maosValidas === 'undefined') return alert("Erro: banco_solucoes.js não carregado!");
            const mao = maosValidas[Math.floor(Math.random() * maosValidas.length)];
            db.ref('salas/' + salaID).update({
                cartas: mao,
                status: "jogando",
                quemBateu: ""
            });
        }

        function renderizarCartas(cartas) {
            const mesa = document.getElementById('mesa-cartas');
            mesa.innerHTML = "";
            cartas.forEach(num => {
                let v = (num === 1) ? 'A' : (num === 10) ? '0' : (num === 11) ? 'J' : (num === 12) ? 'Q' : (num === 13) ? 'K' : num;
                mesa.innerHTML += `<img src="https://deckofcardsapi.com/static/img/${v}C.png" class="card-img">`;
            });
        }

        function bater() {
            db.ref('salas/' + salaID).update({ status: "bloqueado", quemBateu: meuNome });
            document.getElementById('area-solucao').style.display = 'block';
            document.getElementById('input-conta').focus();
        }

        function verificarConta() {
            const conta = document.getElementById('input-conta').value;
            try {
                if (/[^0-9\+\-\*\/\(\)\. ]/.test(conta)) return alert("Sinais permitidos: + - * / ( )");
                
                const numsUsados = (conta.match(/\d+/g) || []).map(Number).sort((a,b) => a-b);
                const mesaOrdenada = [...cartasAtuais].sort((a,b) => a-b);

                if (JSON.stringify(numsUsados) !== JSON.stringify(mesaOrdenada)) {
                    return alert("Você deve usar cada carta da mesa exatamente uma vez!");
                }

                if (Math.abs(eval(conta) - 24) < 0.1) {
                    alert("BOA! Você pontuou!");
                    distribuirPontos();
                    db.ref('salas/' + salaID).update({
                        status: "jogando",
                        quemBateu: "",
                        ultimaSolucao: `🏆 ${meuNome} acertou: ${conta}`
                    });
                    document.getElementById('input-conta').value = "";
                } else {
                    alert("A conta não deu 24! A sala foi liberada.");
                    db.ref('salas/' + salaID).update({ status: "jogando", quemBateu: "" });
                }
            } catch(e) { alert("Equação inválida!"); }
        }

        function distribuirPontos() {
            // Lógica: 1º ganha N pontos (total de pessoas), 2º ganha N-1... último ganha 0.
            // Para simplificar no MVP: O vencedor da rodada ganha pontos baseado no número de jogadores ativos.
            const pontosGanhos = listaJogadoresLocal.length; 
            db.ref(`salas/${salaID}/jogadores/${meuNome}/pontos`).transaction(p => (p || 0) + pontosGanhos);
        }
    </script>
</body>
</html>
